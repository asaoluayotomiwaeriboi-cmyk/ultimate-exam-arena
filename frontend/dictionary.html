<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ultimate Exam Arena</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1d4ed8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Ultimate Exam Arena" />
    <style>
      .dictionary-search {
        display: flex;
        gap: 12px;
        margin-bottom: 24px;
      }
      .dictionary-search input {
        flex: 1;
        padding: 12px 16px;
        border: 1px solid #dbe4ff;
        border-radius: 8px;
      }
      .word-card {
        background: white;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 16px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      .word-title {
        font-size: 1.3rem;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .pronunciation {
        color: #666;
        font-style: italic;
        margin-bottom: 12px;
      }
      .definition {
        margin: 12px 0;
      }
      .synonyms {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid #eee;
      }
      .audio-btn {
        padding: 8px 16px;
        background: #1243b0;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <header class="navbar">
        <div class="logo">Ultimate Exam Arena</div>
        <div class="toolbox">
          <a href="dashboard.html" class="btn btn-secondary">Back to Dashboard</a>
          <button class="btn btn-secondary logout-btn">Logout</button>
        </div>
      </header>

      <section class="layout-dashboard">
        <aside class="sidebar">
          <h3>Dictionary</h3>
          <p>Learn new words and improve your vocabulary for exams.</p>
          <div class="feature-card">
            <h4>Study Efficiently</h4>
            <p>Search for words, listen to pronunciation, and see usage examples.</p>
          </div>
        </aside>

        <section class="main-panel">
          <div class="header">
            <h2>Dictionary</h2>
          </div>

          <div class="dictionary-search">
            <input type="text" id="search-input" placeholder="Search for a word..." />
            <button id="search-btn" class="btn btn-primary">Search</button>
          </div>

          <div id="words-list"></div>
        </section>
      </section>
    </main>

    <script src="js/escape.js"></script>
    <script>
      const { escapeHtml, escapeJoin } = window;
      const token = localStorage.getItem('cbt_token');
      if (!token) window.location.href = '/login.html';

      const request = async (path, options = {}) => {
        const res = await fetch(path, {
          headers: { Authorization: `Bearer ${token}` },
          ...options,
        });
        return await res.json();
      };

      const searchInput = document.getElementById('search-input');
      const searchBtn = document.getElementById('search-btn');
      const wordsList = document.getElementById('words-list');

      searchBtn?.addEventListener('click', async () => {
        const word = searchInput.value.trim();
        if (!word) return alert('Please enter a word to search');

        const data = await request(`/api/features/dictionary?word=${word}`);
        if (data.success) {
          wordsList.innerHTML = data.data
            .map(
              (w) => `
          <div class="word-card">
            <div class="word-title">${escapeHtml(w.word)}</div>
            ${w.pronunciation ? `<div class="pronunciation">${escapeHtml(w.pronunciation)}</div>` : ''}
            <div class="definition"><strong>Definition:</strong> ${escapeHtml(w.definition)}</div>
            ${w.example ? `<div class="definition"><strong>Example:</strong> ${escapeHtml(w.example)}</div>` : ''}
            ${w.synonyms && w.synonyms.length > 0 ? `<div class="synonyms"><strong>Synonyms:</strong> ${escapeJoin(w.synonyms, ', ')}</div>` : ''}
          </div>
        `
            )
            .join('');
        } else {
          wordsList.innerHTML = '<p>No words found. Try another search.</p>';
        }
      });

      // Logout handler
      document.querySelectorAll('.logout-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          localStorage.removeItem('cbt_token');
          window.location.href = '/login.html';
        });
      });
    </script>
  </body>
</html>
