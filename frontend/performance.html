<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ultimate Exam Arena</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1d4ed8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Ultimate Exam Arena" />
    <style>
      .stat-card {
        background: linear-gradient(135deg, #1243b0 0%, #0d36a1 100%);
        color: white;
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 16px;
      }
      .stat-label {
        font-size: 0.9rem;
        opacity: 0.9;
      }
      .stat-value {
        font-size: 2rem;
        font-weight: 700;
        margin-top: 8px;
      }
      .subject-breakdown {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 16px;
        margin-top: 24px;
      }
      .subject-item {
        background: white;
        padding: 16px;
        border-radius: 8px;
        border-left: 4px solid #1243b0;
      }
      .subject-name {
        font-weight: 600;
        margin-bottom: 8px;
      }
      .progress-bar {
        width: 100%;
        height: 8px;
        background: #eee;
        border-radius: 4px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: #1243b0;
        transition: width 0.3s ease;
      }
      .feedback-box {
        background: #f0f4ff;
        padding: 16px;
        border-radius: 8px;
        border-left: 4px solid #1243b0;
        margin-top: 24px;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <header class="navbar">
        <div class="logo">Ultimate Exam Arena</div>
        <div class="toolbox">
          <a href="dashboard.html" class="btn btn-secondary">Back to Dashboard</a>
          <button class="btn btn-secondary logout-btn">Logout</button>
        </div>
      </header>

      <section class="layout-dashboard">
        <aside class="sidebar">
          <h3>Performance Analysis</h3>
          <p>Track your exam performance and identify areas for improvement.</p>
          <div class="feature-card">
            <h4>Data-Driven Insights</h4>
            <p>Get detailed analytics on your strengths and weaknesses.</p>
          </div>
        </aside>

        <section class="main-panel">
          <div class="header">
            <h2>Your Performance Analysis</h2>
          </div>

          <div id="stats-container"></div>

          <h3 style="margin-top: 32px">Subject Breakdown</h3>
          <div class="subject-breakdown" id="subject-breakdown"></div>

          <div class="feedback-box" id="feedback-box"></div>
        </section>
      </section>
    </main>

    <script>
      const token = localStorage.getItem('cbt_token');
      if (!token) window.location.href = '/login.html';

      const request = async (path, options = {}) => {
        const res = await fetch(path, {
          headers: { Authorization: `Bearer ${token}` },
          ...options,
        });
        return await res.json();
      };

      const loadAnalysis = async () => {
        const data = await request('/api/features/performance/analysis');

        if (data.success && data.data) {
          const analysis = data.data;

          // Stats Cards
          const statsContainer = document.getElementById('stats-container');
          statsContainer.innerHTML = `
          <div class="stat-card">
            <div class="stat-label">Exams Taken</div>
            <div class="stat-value">${analysis.examsTaken}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Average Score</div>
            <div class="stat-value">${analysis.averageScore}%</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total Score</div>
            <div class="stat-value">${analysis.totalScore}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Improvement Rate</div>
            <div class="stat-value">${analysis.improvementRate || '0'}%</div>
          </div>
        `;

          // Subject Breakdown
          const subjectBreakdown = document.getElementById('subject-breakdown');
          if (analysis.subjectPerformance && Object.keys(analysis.subjectPerformance).length > 0) {
            subjectBreakdown.innerHTML = Object.entries(analysis.subjectPerformance)
              .map(
                ([subject, data]) => `
            <div class="subject-item">
              <div class="subject-name">${subject}</div>
              <div>Score: ${data.averageScore}%</div>
              <div>Attempts: ${data.attempts}</div>
              <div class="progress-bar">
                <div class="progress-fill" style="width: ${data.averageScore}%"></div>
              </div>
            </div>
          `
              )
              .join('');
          }

          // Feedback
          const feedbackBox = document.getElementById('feedback-box');
          let feedbackHTML = '<h4>Analysis Summary</h4>';
          if (analysis.bestSubject)
            feedbackHTML += `<p>✓ Best Subject: <strong>${analysis.bestSubject}</strong></p>`;
          if (analysis.weakestSubject)
            feedbackHTML += `<p>→ Needs Improvement: <strong>${analysis.weakestSubject}</strong></p>`;
          feedbackBox.innerHTML = feedbackHTML;
        }
      };

      // Logout handler
      document.querySelectorAll('.logout-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          localStorage.removeItem('cbt_token');
          window.location.href = '/login.html';
        });
      });

      loadAnalysis();
    </script>
  </body>
</html>
