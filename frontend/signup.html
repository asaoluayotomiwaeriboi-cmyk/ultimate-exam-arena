<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultimate Exam Arena</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1d4ed8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Ultimate Exam Arena">
</head>
<body>
  <header class="container navbar">
    <a class="logo" href="/">Ultimate Exam Arena</a>
  </header>
  <main class="container">
    <div class="form-card">
      <h2 id="auth-title">Create a student account</h2>
      <p id="auth-message"></p>
      <form id="auth-form" data-mode="signup">
        <div class="input-group name-field">
          <label for="name">Name</label>
          <input type="text" id="name" required placeholder="John Doe">
        </div>
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="student@example.com">
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="Create a strong password">
        </div>
        <button class="btn btn-primary" type="submit">Register</button>
      </form>
      <button id="toggle-auth" class="btn btn-secondary" type="button">Already have an account? Login</button>
    </div>
  </main>
  <script src="js/auth.js"></script>
</body>
</html>
