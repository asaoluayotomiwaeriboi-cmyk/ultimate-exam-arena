<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultimate Exam Arena</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1d4ed8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Ultimate Exam Arena">
  <style>
    .leaderboard-table { width: 100%; border-collapse: collapse; }
    .leaderboard-table th { background: #1243b0; color: white; padding: 12px; text-align: left; }
    .leaderboard-table td { padding: 12px; border-bottom: 1px solid #eee; }
    .leaderboard-table tr:hover { background: #f9fbff; }
    .rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%; background: #1243b0; color: white; font-weight: 600; }
    .rank-1 { background: gold; color: #333; }
    .rank-2 { background: silver; color: #333; }
    .rank-3 { background: #cd7f32; color: white; }
  </style>
</head>
<body>
  <main class="container">
    <header class="navbar">
      <div class="logo">Ultimate Exam Arena</div>
      <div class="toolbox">
        <a href="dashboard.html" class="btn btn-secondary">Back to Dashboard</a>
        <button class="btn btn-secondary logout-btn">Logout</button>
      </div>
    </header>

    <section class="layout-dashboard">
      <aside class="sidebar">
        <h3>Leaderboard</h3>
        <p>See how you rank against other students.</p>
        <div class="feature-card">
          <h4>Top Performers</h4>
          <p id="user-rank">Loading your rank...</p>
        </div>
      </aside>

      <section class="main-panel">
        <div class="header">
          <h2>Global Leaderboard</h2>
          <p class="section-title">Top performing students</p>
        </div>

        <div class="card">
          <table class="leaderboard-table">
            <thead>
              <tr>
                <th>Rank</th>
                <th>Student Name</th>
                <th>Total Score</th>
                <th>Exams Taken</th>
                <th>Average Score</th>
              </tr>
            </thead>
            <tbody id="leaderboard-body">
              <tr><td colspan="5" style="text-align: center;">Loading leaderboard...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <script>
    const token = localStorage.getItem('cbt_token');
    if (!token) window.location.href = '/login.html';

    const request = async (path, options = {}) => {
      const res = await fetch(path, { headers: { Authorization: `Bearer ${token}` }, ...options });
      return await res.json();
    };

    const loadLeaderboard = async () => {
      const data = await request('/api/features/leaderboard?limit=100');
      const rankData = await request('/api/features/leaderboard/rank');
      
      if (data.success) {
        const tbody = document.getElementById('leaderboard-body');
        tbody.innerHTML = data.data.map((user, index) => {
          const rankClass = index === 0 ? 'rank-1' : index === 1 ? 'rank-2' : index === 2 ? 'rank-3' : '';
          return `
            <tr>
              <td><span class="rank-badge ${rankClass}">${index + 1}</span></td>
              <td>${user.userName}</td>
              <td>${user.totalScore}</td>
              <td>${user.examsTaken}</td>
              <td>${user.averageScore}%</td>
            </tr>
          `;
        }).join('');
      }

      if (rankData.success && rankData.data) {
        document.getElementById('user-rank').textContent = `Your Rank: #${rankData.data.rank}`;
      }
    };

    // Logout handler
    document.querySelectorAll('.logout-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        localStorage.removeItem('cbt_token');
        window.location.href = '/login.html';
      });
    });

    loadLeaderboard();
  </script>
</body>
</html>
