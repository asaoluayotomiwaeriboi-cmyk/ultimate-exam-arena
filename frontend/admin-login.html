<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ultimate Exam Arena</title>
    <meta name="description" content="Your Ultimate JAMB UTME Practice Platform" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/sidebar.css" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1d4ed8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Ultimate Exam Arena" />
  </head>
  <body>
    <header class="container navbar">
      <a class="logo" href="/">Ultimate Exam Arena</a>
    </header>
    <main class="container">
      <div class="branding">
        <h1>🔐 Admin Portal</h1>
        <p>Your Ultimate JAMB UTME Practice Platform</p>
      </div>
      <div class="form-card">
        <h2>Administrator Login</h2>
        <p id="auth-message" style="color: #f87171"></p>
        <form id="admin-form">
          <div class="input-group">
            <label for="email">Admin Email</label>
            <input type="email" id="email" required placeholder="admin@ultimateexamarena.com" />
          </div>
          <div class="input-group">
            <label for="password">Password</label>
            <div style="display:flex;gap:8px;align-items:center">
              <input type="password" id="password" required placeholder="Enter password" />
              <button type="button" id="toggle-admin-password" class="btn btn-link small">Show</button>
            </div>
          </div>
          <div class="input-group">
            <label for="access-code">Access Code</label>
            <input type="text" id="access-code" required placeholder="Enter access code" />
          </div>
          <button class="btn btn-primary" type="submit">Login</button>
          <div id="lockout-timer" style="margin-top:8px;color:var(--muted)"></div>
        </form>
        <p style="margin-top: 20px; text-align: center; color: var(--text-muted)">
          <a href="/login.html" style="color: var(--primary)">← Back to Student Login</a>
        </p>
      </div>
    </main>
    <script src="js/admin-login.js"></script>
  </body>
</html>
