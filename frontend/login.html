<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ultimate Exam Arena - Login</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="stylesheet" href="css/sidebar.css" />
    <meta name="theme-color" content="#1d4ed8" />
  </head>
  <body class="auth-body">
    <main class="auth-container">
      <div class="auth-card">
        <div class="auth-left">
          <h1>Welcome Back to Ultimate Exam Arena</h1>
          <p class="muted">Access practice tests, track progress, and compete with peers.</p>
        </div>
        <div class="auth-right">
          <form id="auth-form" data-mode="login" class="auth-form">
            <h2>Sign in</h2>
            <div id="auth-message" class="auth-message" aria-live="polite"></div>

            <a href="/api/auth/google" class="btn btn-google full auth-google-btn" role="button">
              <span aria-hidden="true">🔷</span>
              <span>Sign in with Google</span>
            </a>

            <div class="separator"><span>Or continue with</span></div>

            <label class="input-label">Email</label>
            <input type="email" id="email" required placeholder="student@example.com" />

            <label class="input-label">Password</label>
            <div class="password-row">
              <input type="password" id="password" required placeholder="Enter your password" />
              <button type="button" id="toggle-password" class="btn btn-link small">Show</button>
            </div>

            <div class="actions">
              <a href="#" class="muted small">Forgot password?</a>
            </div>

            <button class="btn btn-primary full" id="submit-btn" type="submit">Login</button>
            <p class="muted center">Don't have an account? <a href="/signup.html">Sign up</a></p>

            <p class="muted tiny center">By logging in, you agree to our terms</p>
          </form>
        </div>
      </div>
    </main>

    <script src="js/sidebar.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
